<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" fill="none">
  <rect width="600" height="500" rx="24" fill="#F5F5F4"/>
  <!-- House body -->
  <rect x="180" y="220" width="240" height="180" rx="8" fill="#E7E5E4"/>
  <!-- Roof -->
  <path d="M160 230 L300 130 L440 230" stroke="#1B4D3E" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="#D6D3D1"/>
  <!-- Door -->
  <rect x="275" y="310" width="50" height="90" rx="6" fill="#1B4D3E"/>
  <circle cx="315" cy="360" r="4" fill="#2D7A5F"/>
  <!-- Windows -->
  <rect x="205" y="260" width="50" height="45" rx="4" fill="#A8A29E" stroke="#1B4D3E" stroke-width="2"/>
  <line x1="230" y1="260" x2="230" y2="305" stroke="#1B4D3E" stroke-width="2"/>
  <line x1="205" y1="282" x2="255" y2="282" stroke="#1B4D3E" stroke-width="2"/>
  <rect x="345" y="260" width="50" height="45" rx="4" fill="#A8A29E" stroke="#1B4D3E" stroke-width="2"/>
  <line x1="370" y1="260" x2="370" y2="305" stroke="#1B4D3E" stroke-width="2"/>
  <line x1="345" y1="282" x2="395" y2="282" stroke="#1B4D3E" stroke-width="2"/>
  <!-- Ground -->
  <rect x="100" y="398" width="400" height="4" rx="2" fill="#D6D3D1"/>
  <!-- Trees -->
  <circle cx="130" cy="340" r="30" fill="#2D7A5F" opacity="0.6"/>
  <rect x="126" y="365" width="8" height="35" rx="2" fill="#57534E"/>
  <circle cx="480" cy="330" r="35" fill="#1B4D3E" opacity="0.5"/>
  <rect x="476" y="360" width="8" height="40" rx="2" fill="#57534E"/>
  <!-- Key icon -->
  <circle cx="490" cy="180" r="20" stroke="#1B4D3E" stroke-width="4" fill="none"/>
  <line x1="505" y1="195" x2="530" y2="220" stroke="#1B4D3E" stroke-width="4" stroke-linecap="round"/>
  <line x1="520" y1="210" x2="530" y2="200" stroke="#1B4D3E" stroke-width="4" stroke-linecap="round"/>
</svg>
