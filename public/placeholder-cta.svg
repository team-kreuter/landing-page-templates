<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" fill="none">
  <rect width="500" height="400" rx="20" fill="#292524"/>
  <!-- Clipboard -->
  <rect x="170" y="80" width="160" height="220" rx="12" fill="#44403C" stroke="#57534E" stroke-width="2"/>
  <rect x="220" y="65" width="60" height="25" rx="8" fill="#57534E"/>
  <!-- Checkmark lines -->
  <circle cx="205" cy="135" r="8" fill="#1B4D3E"/>
  <path d="M200 135 L204 139 L212 131" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="225" y="130" width="80" height="8" rx="3" fill="#57534E"/>
